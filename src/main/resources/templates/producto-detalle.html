<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.nombre}">GlobalLive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%); color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .molecula { position: absolute; animation: flotarMolecula linear infinite; opacity: 0.08; }
        @keyframes flotarMolecula { 0% { transform: translateY(105vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.1; } 90% { opacity: 0.05; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        .container { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 20px; }
        .back-btn { display: inline-block; color: #4CAF50; text-decoration: none; padding: 10px 20px; margin: 20px 0; border: 1px solid #4CAF50; border-radius: 25px; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; }
        .back-btn:hover { background: rgba(76,175,80,0.1); }
        .producto-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; overflow: hidden; }
        .imagen-principal { width: 100%; max-height: 450px; object-fit: cover; display: block; }
        .imagenes-secundarias { display: flex; gap: 8px; justify-content: center; padding: 12px; background: rgba(0,0,0,0.3); }
        .imagen-secundaria { width: 60px; height: 60px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; object-fit: cover; transition: all 0.3s; filter: brightness(0.9); }
        .imagen-secundaria:hover { border-color: #4CAF50; filter: brightness(1); }
        .info-section { padding: 30px; }
        .nombre { font-size: 1.8rem; font-weight: 300; color: #fff; letter-spacing: 1px; margin-bottom: 10px; }
        .precio { font-size: 2.5rem; font-weight: 600; color: #4CAF50; margin-bottom: 10px; }
        .meta { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .sku { color: #4CAF50; font-size: 0.85rem; }
        .categoria { background: rgba(76,175,80,0.1); color: #4CAF50; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; border: 1px solid rgba(76,175,80,0.2); text-transform: uppercase; }
        .especificaciones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; padding: 15px; background: rgba(76,175,80,0.03); border: 1px solid rgba(76,175,80,0.1); border-radius: 10px; text-align: center; }
        .esp-item .esp-label { color: #888; font-size: 0.7rem; text-transform: uppercase; }
        .esp-item .esp-value { color: #fff; font-size: 0.95rem; font-weight: 500; }
        .descripcion { color: #aaa; line-height: 1.8; font-size: 0.9rem; margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .cantidad-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; padding: 15px; background: rgba(76,175,80,0.03); border-radius: 12px; border: 1px solid rgba(76,175,80,0.15); }
        .cantidad-row label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .qty-btn { background: transparent; color: #4CAF50; border: 1px solid #4CAF50; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; }
        .qty-btn:hover { background: #4CAF50; color: #000; }
        .qty-input { width: 55px; text-align: center; background: #111; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 6px; font-size: 0.95rem; }
        .subtotal-display { color: #4CAF50; font-weight: 600; font-size: 1.1rem; }
        .acciones { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-carrito { width: 100%; padding: 16px; text-align: center; background: #4CAF50; color: #000; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 25px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-carrito:hover { box-shadow: 0 0 30px rgba(76,175,80,0.4); }
        .btn-contraentrega { width: 100%; padding: 16px; text-align: center; background: transparent; color: #fff; font-size: 0.95rem; font-weight: 600; border: 2px solid #fff; border-radius: 25px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-contraentrega:hover { background: #fff; color: #000; }
        .acciones-hint { text-align: center; color: #666; font-size: 0.7rem; margin-top: 5px; }
        .banner-pago { background: rgba(76,175,80,0.05); border: 1px solid rgba(76,175,80,0.2); border-radius: 12px; padding: 15px; text-align: center; margin-top: 15px; }
        .banner-pago .icono { font-size: 1.5rem; }
        .banner-pago h3 { color: #4CAF50; font-size: 0.9rem; margin: 5px 0; font-weight: 500; }
        .banner-pago p { color: #888; font-size: 0.8rem; }
        .banner-pago .destacado { color: #fff; font-weight: 600; }
        @media (max-width: 500px) { .especificaciones { grid-template-columns: repeat(2, 1fr); } .info-section { padding: 20px; } }
    </style>
</head>
<body>
<div class="bg-animated" id="bgAnimado"></div>
<div class="container">
    <a href="/" class="back-btn">← Volver</a>
    <div class="producto-card">
        <img class="imagen-principal" th:src="${producto.imagen1}" th:alt="${producto.nombre}" id="imgPrincipal">
        <div class="imagenes-secundarias" th:if="${producto.imagen2 != null or producto.imagen3 != null or producto.imagen4 != null}">
            <img class="imagen-secundaria" th:src="${producto.imagen1}" onclick="document.getElementById('imgPrincipal').src=this.src">
            <img class="imagen-secundaria" th:if="${producto.imagen2 != null}" th:src="${producto.imagen2}" onclick="document.getElementById('imgPrincipal').src=this.src">
            <img class="imagen-secundaria" th:if="${producto.imagen3 != null}" th:src="${producto.imagen3}" onclick="document.getElementById('imgPrincipal').src=this.src">
            <img class="imagen-secundaria" th:if="${producto.imagen4 != null}" th:src="${producto.imagen4}" onclick="document.getElementById('imgPrincipal').src=this.src">
        </div>
        <div class="info-section">
            <h1 class="nombre" th:text="${producto.nombre}">Nombre</h1>
            <div class="precio" th:text="'$' + ${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">Precio</div>
            <div class="meta"><span class="sku" th:text="'Ref: ' + ${producto.sku}">SKU</span><span class="categoria" th:text="${producto.categoria}">Categoría</span></div>
            <div class="especificaciones" th:if="${producto.largo != null}">
                <div class="esp-item"><div class="esp-label">Largo</div><div class="esp-value" th:text="${producto.largo}">-</div></div>
                <div class="esp-item"><div class="esp-label">Ancho</div><div class="esp-value" th:text="${producto.ancho}">-</div></div>
                <div class="esp-item"><div class="esp-label">Alto</div><div class="esp-value" th:text="${producto.alto}">-</div></div>
                <div class="esp-item"><div class="esp-label">Peso</div><div class="esp-value" th:text="${producto.peso}">-</div></div>
            </div>
            <div class="descripcion" th:text="${producto.descripcionLarga != null ? producto.descripcionLarga : producto.descripcion}">Descripción</div>
            <div class="cantidad-row">
                <label>Cantidad</label><button class="qty-btn" onclick="cambiarCantidad(-1)">−</button>
                <input class="qty-input" type="number" id="cantidad" value="1" min="1" onchange="actualizarSubtotal()">
                <button class="qty-btn" onclick="cambiarCantidad(1)">+</button>
                <span class="subtotal-display" id="subtotalDisplay">= $<span th:text="${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">0</span></span>
            </div>
            <div class="acciones">
                <button class="btn-carrito" onclick="agregarAlCarrito()">Agregar al carrito</button>
                <button class="btn-contraentrega" onclick="comprarContraEntrega()">Pagar contra entrega</button>
                <p class="acciones-hint">Carrito para pago electrónico · Contra entrega para pagar al recibir</p>
            </div>
            <div class="banner-pago"><div class="icono">💚</div><h3>Pago contra entrega</h3><p>Recibe tu producto y <span class="destacado">pagas al recibirlo</span>. Envío <span class="destacado">GRATIS</span></p></div>
        </div>
    </div>
</div>

<!-- CHAT FLOTANTE -->
<div id="chatFloating" style="position:fixed; bottom:20px; right:20px; z-index:999;">
    <button onclick="toggleChat()" style="background:#4CAF50; color:#000; border:none; width:60px; height:60px; border-radius:50%; font-size:1.5rem; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.5);">💬</button>
    <div id="chatBox" style="display:none; position:absolute; bottom:70px; right:0; width:380px; background:#1a1a1a; border:1px solid #4CAF50; border-radius:16px; overflow:hidden;">
        <div style="background:#4CAF50; color:#000; padding:15px; display:flex; justify-content:space-between; align-items:center;"><h3 style="margin:0; font-size:1rem;">💬 GlobalLive</h3><button onclick="toggleChat()" style="background:none; border:none; color:#000; font-size:1.2rem; cursor:pointer;">✕</button></div>
        <div id="chatLogin" style="padding:20px;">
            <p style="color:#888; font-size:0.8rem; margin-bottom:10px;">Ingresa tu código de seguimiento o celular</p>
            <input type="text" id="chatCodigoInput" placeholder="Código o celular..." style="width:100%; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; margin-bottom:10px;">
            <button onclick="iniciarChat()" style="width:100%; padding:10px; background:#4CAF50; color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Ver mi pedido</button>
            <div id="chatError" style="color:#ff4444; font-size:0.75rem; margin-top:8px;"></div>
        </div>
        <div id="chatContent" style="display:none; flex-direction:column; height:400px;">
            <div id="chatPedidoInfo" style="padding:12px; background:rgba(76,175,80,0.1); border-bottom:1px solid #333; font-size:0.8rem;"></div>
            <div id="chatMensajes" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px;"></div>
            <div style="padding:12px; border-top:1px solid #333; display:flex; gap:8px;">
                <input type="text" id="chatMensajeInput" placeholder="Escribe..." style="flex:1; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff;">
                <button onclick="enviarMensajeChat()" style="background:#4CAF50; color:#000; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:600;">Enviar</button>
            </div>
        </div>
    </div>
</div>

<script>
    var precioBase = 0;
    window.onload = function() { var precioTexto = document.querySelector('.precio').textContent; precioTexto = precioTexto.replace('$', '').replace(/\./g, '').replace(/,/g, '').trim(); precioBase = parseInt(precioTexto) || 0; };
    function cambiarCantidad(delta) { const input = document.getElementById('cantidad'); let val = parseInt(input.value) || 1; val = Math.max(1, val + delta); input.value = val; actualizarSubtotal(); }
    function actualizarSubtotal() { const cantidad = parseInt(document.getElementById('cantidad').value) || 1; const subtotal = precioBase * cantidad; document.getElementById('subtotalDisplay').innerHTML = '= $' + subtotal.toLocaleString('es-CO'); }
    function agregarAlCarrito() { const nombre = document.querySelector('.nombre').textContent.trim(); const imagen = document.getElementById('imgPrincipal')?.src || ''; const cantidad = parseInt(document.getElementById('cantidad').value) || 1; let carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || []; carrito.push({ nombre, precio: precioBase, imagen, cantidad, color: '', talla: '' }); localStorage.setItem('carritoVibeColombia', JSON.stringify(carrito)); const btn = document.querySelector('.btn-carrito'); btn.textContent = '✓ Agregado'; setTimeout(() => { if (confirm('¿Ver carrito?')) window.location.href = '/carrito'; else btn.textContent = 'Agregar al carrito'; }, 500); }
    function comprarContraEntrega() { const nombre = document.querySelector('.nombre').textContent.trim(); const imagen = document.getElementById('imgPrincipal')?.src || ''; const cantidad = parseInt(document.getElementById('cantidad').value) || 1; let carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || []; carrito.push({ nombre, precio: precioBase, imagen, cantidad, color: '', talla: '', contraentrega: true }); localStorage.setItem('carritoVibeColombia', JSON.stringify(carrito)); window.location.href = '/carrito'; }

    var chatCodigo = '';
    function toggleChat() { var box = document.getElementById('chatBox'); box.style.display = box.style.display === 'none' ? 'block' : 'none'; }
    function iniciarChat() {
        var codigo = document.getElementById('chatCodigoInput').value.trim(); if (!codigo) return; document.getElementById('chatError').textContent = '';
        fetch('/api/pedido/' + codigo).then(r => r.json()).then(data => {
            if (!data.error) { chatCodigo = data.codigo; mostrarChatInfo(data); }
            else {
                var telefono = codigo.replace(/[^0-9]/g, '');
                if (telefono.length >= 10) {
                    fetch('/api/chat/mensajes?telefono=' + telefono).then(r => r.json()).then(mensajes => {
                        if (mensajes.length > 0) { chatCodigo = mensajes[0].codigoPedido; fetch('/api/pedido/' + chatCodigo).then(r => r.json()).then(d => { if (!d.error) mostrarChatInfo(d); }); }
                        else { document.getElementById('chatError').textContent = 'No se encontró el pedido.'; }
                    });
                } else { document.getElementById('chatError').textContent = 'No se encontró el pedido.'; }
            }
        });
    }
    function mostrarChatInfo(data) { document.getElementById('chatLogin').style.display = 'none'; document.getElementById('chatContent').style.display = 'flex'; document.getElementById('chatPedidoInfo').innerHTML = '<strong style="color:#4CAF50;">📦 ' + data.codigo + '</strong> | Estado: ' + data.estado + (data.transportadora ? ' | 🚚 ' + data.transportadora + ' - ' + data.numeroGuia : ''); cargarMensajesChat(); }
    function cargarMensajesChat() {
        var chatInput = document.getElementById('chatMensajeInput'); var textoActual = chatInput ? chatInput.value : '';
        fetch('/api/chat/mensajes?codigo=' + chatCodigo).then(r => r.json()).then(mensajes => {
            var html = ''; mensajes.forEach(function(m) { if (m.esCliente) { html += '<div style="align-self:flex-end; background:#4CAF50; color:#000; padding:8px 12px; border-radius:12px; max-width:80%; font-size:0.85rem;">' + m.mensaje + '</div>'; if (m.respuesta) html += '<div style="align-self:flex-start; background:#333; color:#fff; padding:8px 12px; border-radius:12px; max-width:80%; font-size:0.85rem;">' + m.respuesta + '</div>'; } });
            document.getElementById('chatMensajes').innerHTML = html || '<p style="color:#666; text-align:center;">Envía un mensaje para recibir ayuda</p>';
            document.getElementById('chatMensajes').scrollTop = document.getElementById('chatMensajes').scrollHeight;
            if (chatInput && textoActual.length > 0) { chatInput.value = textoActual; chatInput.focus(); }
        });
        setTimeout(cargarMensajesChat, 3000);
    }
    function enviarMensajeChat() { var mensaje = document.getElementById('chatMensajeInput').value.trim(); if (!mensaje) return; fetch('/api/chat/enviar', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({codigo:chatCodigo, telefono:'', mensaje:mensaje}) }).then(function() { document.getElementById('chatMensajeInput').value = ''; cargarMensajesChat(); }); }

    actualizarSubtotal();
    const bg = document.getElementById('bgAnimado'); const iconos = ['🧬','💊','🌿','🩺','🧪','💚','🫒','🍃','✨','🧘'];
    for (let i = 0; i < 20; i++) { const el = document.createElement('div'); el.className = 'molecula'; el.textContent = iconos[Math.floor(Math.random()*iconos.length)]; el.style.cssText = 'left:'+Math.random()*95+'%;font-size:'+(Math.random()*2+1)+'rem;animation-duration:'+(Math.random()*20+15)+'s;animation-delay:'+Math.random()*10+'s;'; bg.appendChild(el); }
</script>
</body>
</html>
