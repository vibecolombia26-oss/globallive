<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.id != null ? 'Editar' : 'Nuevo'} + ' Producto'">Formulario</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh;
        }
        .container { max-width: 750px; margin: 0 auto; padding: 20px; }
        .form-container {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; padding: 30px;
        }
        h1 { text-align: center; margin-bottom: 25px; font-weight: 300; color: #4CAF50; letter-spacing: 3px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select {
            width: 100%; padding: 12px; background: #111;
            border: 1px solid #333; border-radius: 6px;
            color: #fff; font-size: 0.9rem; transition: all 0.3s;
        }
        input:focus, textarea:focus { border-color: #4CAF50; outline: none; }
        textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        .btn-guardar {
            width: 100%; padding: 15px; margin-top: 20px;
            background: #4CAF50; color: #000; font-size: 0.95rem; font-weight: 600;
            border: none; border-radius: 25px; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-guardar:hover { box-shadow: 0 0 30px rgba(76,175,80,0.4); }
        .btn-volver {
            display: inline-block; margin-bottom: 15px;
            color: #4CAF50; text-decoration: none; padding: 8px 16px;
            border: 1px solid #4CAF50; border-radius: 25px; font-size: 0.85rem;
        }
        .imagen-actual {
            width: 60px; height: 60px; border-radius: 6px;
            object-fit: cover; border: 1px solid rgba(255,255,255,0.1); margin: 5px;
        }
        .section-title { color: #4CAF50; margin: 20px 0 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/admin/panel(key=${key})}" class="btn-volver">← Volver</a>
    <div class="form-container">
        <h1 th:text="${producto.id != null ? 'Editar Producto' : 'Nuevo Producto'}">Formulario</h1>
        <form th:action="@{/admin/guardar}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="key" th:value="${key}">
            <input type="hidden" name="id" th:value="${producto.id}">
            <div class="form-group">
                <label>Nombre del Producto *</label>
                <input type="text" name="nombre" th:value="${producto.nombre}" required>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Precio (COP) *</label><input type="number" name="precio" th:value="${producto.precio}" step="0.01" required></div>
                <div class="form-group"><label>SKU</label><input type="text" name="sku" th:value="${producto.sku}"></div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Categoría</label>
                    <select name="categoria">
                        <option value="">Seleccionar...</option>
                        <option value="Salud" th:selected="${producto.categoria == 'Salud'}">Salud</option>
                        <option value="Bienestar" th:selected="${producto.categoria == 'Bienestar'}">Bienestar</option>
                        <option value="Cuidado" th:selected="${producto.categoria == 'Cuidado'}">Cuidado</option>
                        <option value="Nutrición" th:selected="${producto.categoria == 'Nutrición'}">Nutrición</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descripción corta (tienda)</label>
                    <textarea name="descripcion" th:text="${producto.descripcion}" placeholder="Texto breve"></textarea>
                </div>
            </div>
            <div class="form-group">
                <label>Descripción larga (detalle)</label>
                <textarea name="descripcionLarga" th:text="${producto.descripcionLarga}" placeholder="Descripción completa" style="min-height:120px;"></textarea>
            </div>
            <h3 class="section-title">Imágenes</h3>
            <div class="form-row">
                <div class="form-group"><label>Imagen 1</label><input type="file" name="imagen1File" accept="image/*"><img th:if="${producto.imagen1 != null}" class="imagen-actual" th:src="${producto.imagen1}"></div>
                <div class="form-group"><label>Imagen 2</label><input type="file" name="imagen2File" accept="image/*"><img th:if="${producto.imagen2 != null}" class="imagen-actual" th:src="${producto.imagen2}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Imagen 3</label><input type="file" name="imagen3File" accept="image/*"><img th:if="${producto.imagen3 != null}" class="imagen-actual" th:src="${producto.imagen3}"></div>
                <div class="form-group"><label>Imagen 4</label><input type="file" name="imagen4File" accept="image/*"><img th:if="${producto.imagen4 != null}" class="imagen-actual" th:src="${producto.imagen4}"></div>
            </div>
            <h3 class="section-title">Medidas</h3>
            <div class="form-row-4">
                <div class="form-group"><label>Largo</label><input type="text" name="largo" th:value="${producto.largo}" placeholder="ej: 18 cm"></div>
                <div class="form-group"><label>Ancho</label><input type="text" name="ancho" th:value="${producto.ancho}" placeholder="ej: 10 cm"></div>
                <div class="form-group"><label>Alto</label><input type="text" name="alto" th:value="${producto.alto}" placeholder="ej: 18 cm"></div>
                <div class="form-group"><label>Peso</label><input type="text" name="peso" th:value="${producto.peso}" placeholder="ej: 246.5 g"></div>
            </div>
            <button type="submit" class="btn-guardar">Guardar Producto</button>
        </form>
    </div>
</div>
</body>
</html>
