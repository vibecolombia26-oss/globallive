<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado - GlobalLive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%);
            color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .confirmacion {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(76,175,80,0.3);
            border-radius: 20px; padding: 50px 40px; text-align: center;
            max-width: 500px; width: 90%;
        }
        .check { font-size: 5rem; color: #4CAF50; margin-bottom: 20px; animation: pop 0.5s ease; }
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        h1 { font-size: 1.8rem; font-weight: 300; color: #4CAF50; letter-spacing: 3px; margin-bottom: 15px; }
        p { color: #888; font-size: 1rem; line-height: 1.6; margin-bottom: 10px; }
        .email-info { color: #4CAF50; font-weight: 500; margin: 20px 0; }
        .btn {
            display: inline-block; margin-top: 20px; padding: 14px 30px;
            background: #4CAF50; color: #000; text-decoration: none;
            border-radius: 25px; font-weight: 600; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem;
        }
        .btn:hover { box-shadow: 0 0 30px rgba(76,175,80,0.4); }
    </style>
</head>
<body>
<div class="confirmacion">
    <div class="check">✅</div>
    <h1>¡Pedido Confirmado!</h1>
    <p>Tu orden ha sido registrada exitosamente.</p>
    <p>Te notificaremos sobre el estado de tu pedido.</p>
    <p class="email-info">📧 Recibirás un correo de confirmación</p>
    <p style="color:#666; font-size:0.85rem;">💚 Gracias por confiar en GlobalLive</p>
    <a href="/" class="btn">Volver a la tienda</a>
</div>
</body>
</html>
