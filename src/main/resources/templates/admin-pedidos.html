<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - GlobalLive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%); color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; }
        .header h1 { font-size: 1.5rem; font-weight: 300; color: #4CAF50; letter-spacing: 3px; }
        .btn { padding: 10px 24px; border-radius: 25px; text-decoration: none; font-weight: 500; transition: all 0.3s; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-productos { background: transparent; color: #4CAF50; border: 1px solid #4CAF50; }
        .btn-productos:hover { background: rgba(76,175,80,0.1); }
        .pedido-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; padding: 20px; margin-bottom: 20px;
        }
        .pedido-header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; margin-bottom: 15px;
            padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .pedido-id { color: #4CAF50; font-weight: 600; font-size: 1.1rem; }
        .pedido-fecha { color: #666; font-size: 0.85rem; }
        .estado {
            padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;
            font-weight: 600; text-transform: uppercase;
        }
        .estado-pendiente { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid #ffc107; }
        .estado-procesando { background: rgba(33,150,243,0.15); color: #2196F3; border: 1px solid #2196F3; }
        .estado-completado { background: rgba(76,175,80,0.15); color: #4CAF50; border: 1px solid #4CAF50; }
        .pedido-body { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.9rem; }
        .pedido-body .label { color: #888; }
        .pedido-body .value { color: #fff; }
        .pedido-productos {
            grid-column: 1 / -1; background: #111; padding: 15px;
            border-radius: 8px; margin-top: 10px;
        }
        .pedido-total { font-size: 1.3rem; color: #4CAF50; font-weight: 600; }
        @media (max-width: 600px) { .pedido-body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Pedidos</h1>
        <div>
            <a th:href="@{/admin/panel(key=${key})}" class="btn btn-productos">← Productos</a>
            <a href="/" class="btn btn-productos" style="margin-left:10px;">Ver Tienda</a>
        </div>
    </div>

    <div th:if="${pedidos.isEmpty()}">
        <p style="text-align:center; color:#666; padding:40px;">No hay pedidos aún</p>
    </div>

    <div th:each="pedido : ${pedidos}">
        <div class="pedido-card">
            <div class="pedido-header">
                <div>
                    <span class="pedido-id">Pedido #<span th:text="${pedido.id}">1</span></span>
                    <span class="pedido-fecha" style="margin-left:15px;" th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                </div>
                <span class="estado estado-pendiente" th:text="${pedido.estado}">Pendiente</span>
            </div>
            <div class="pedido-body">
                <div><span class="label">Cliente:</span> <span class="value" th:text="${pedido.nombreCliente}"></span></div>
                <div><span class="label">Teléfono:</span> <span class="value" th:text="${pedido.telefono}"></span></div>
                <div><span class="label">Email:</span> <span class="value" th:text="${pedido.email}"></span></div>
                <div><span class="label">Ubicación:</span> <span class="value" th:text="${pedido.ciudad} + ', ' + ${pedido.departamento}"></span></div>
                <div class="pedido-productos">
                    <strong style="color:#4CAF50;">Productos:</strong><br>
                    <span th:text="${pedido.productos}" style="white-space:pre-line;"></span>
                </div>
                <div style="grid-column:1/-1; text-align:right;">
                    <span class="label">Método de pago:</span> <span class="value" th:text="${pedido.metodoPago}"></span>
                    <span style="margin-left:20px;" class="pedido-total">Total: $<span th:text="${#numbers.formatDecimal(pedido.total, 0, 'COMMA', 0, 'POINT')}"></span></span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
