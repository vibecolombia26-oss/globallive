<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - GlobalLive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%); color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; }
        .header h1 { font-size: 1.5rem; font-weight: 300; color: #4CAF50; letter-spacing: 3px; }
        .btn { padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 500; transition: all 0.3s; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; display: inline-block; cursor: pointer; border: none; }
        .btn-back { background: transparent; color: #4CAF50; border: 1px solid #4CAF50; }
        .btn-tienda { background: transparent; color: #fff; border: 1px solid #fff; margin-left: 10px; }
        .pedido-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .pedido-id { color: #4CAF50; font-weight: 600; font-size: 1.1rem; }
        .pedido-fecha { color: #666; font-size: 0.85rem; }
        .estado { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; display: inline-block; }
        .estado-pendiente { background: rgba(255,193,7,0.15); color: #ffc107; border: 1px solid #ffc107; }
        .estado-procesando { background: rgba(33,150,243,0.15); color: #2196F3; border: 1px solid #2196F3; }
        .estado-enviado { background: rgba(76,175,80,0.15); color: #4CAF50; border: 1px solid #4CAF50; }
        .estado-entregado { background: rgba(156,39,176,0.15); color: #9C27B0; border: 1px solid #9C27B0; }
        .pedido-body { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.9rem; }
        .pedido-body .label { color: #888; }
        .pedido-body .value { color: #fff; }
        .pedido-productos { grid-column: 1 / -1; background: #111; padding: 15px; border-radius: 8px; margin-top: 10px; white-space: pre-line; }
        .pedido-total { font-size: 1.3rem; color: #4CAF50; font-weight: 600; }
        .acciones { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 15px; }
        .btn-accion { padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; text-decoration: none; font-weight: 500; cursor: pointer; transition: all 0.3s; border: none; text-transform: uppercase; }
        .btn-procesar { background: #2196F3; color: #fff; }
        .btn-enviar { background: #4CAF50; color: #000; }
        .btn-entregar { background: #9C27B0; color: #fff; }
        .btn-whatsapp { background: #25D366; color: #fff; }
        .btn-guia { background: #ff9800; color: #000; }
        .envio-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .envio-form input, .envio-form select { padding: 8px 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 0.85rem; }
        .guia-info { background: rgba(76,175,80,0.05); border: 1px solid rgba(76,175,80,0.2); border-radius: 8px; padding: 10px; margin-top: 10px; font-size: 0.85rem; }
        @media (max-width: 600px) { .pedido-body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Pedidos</h1>
        <div>
            <a th:href="@{/admin/panel(key=${key})}" class="btn btn-back">← Productos</a>
            <a href="/" class="btn btn-tienda">🏪 Ver Tienda</a>
        </div>
    </div>

    <div th:if="${pedidos.isEmpty()}">
        <p style="text-align:center; color:#666; padding:40px;">No hay pedidos aún</p>
    </div>

    <div th:each="pedido : ${pedidos}">
        <div class="pedido-card">
            <div class="pedido-header">
                <div>
                    <span class="pedido-id">Pedido #<span th:text="${pedido.codigo}">GL-123</span></span>
                    <span class="pedido-fecha" style="margin-left:15px;" th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                </div>
                <span class="estado estado-pendiente" th:if="${pedido.estado == 'Pendiente'}" th:text="${pedido.estado}">Pendiente</span>
                <span class="estado estado-procesando" th:if="${pedido.estado == 'Procesando'}" th:text="${pedido.estado}">Procesando</span>
                <span class="estado estado-enviado" th:if="${pedido.estado == 'Enviado'}" th:text="${pedido.estado}">Enviado</span>
                <span class="estado estado-entregado" th:if="${pedido.estado == 'Entregado'}" th:text="${pedido.estado}">Entregado</span>
            </div>
            <div class="pedido-body">
                <div><span class="label">Cliente:</span> <span class="value" th:text="${pedido.nombreCliente}"></span></div>
                <div><span class="label">Teléfono:</span> <span class="value" th:text="${pedido.telefono}"></span></div>
                <div><span class="label">Email:</span> <span class="value" th:text="${pedido.email}"></span></div>
                <div><span class="label">Dirección:</span> <span class="value" th:text="${pedido.direccion + ', ' + pedido.ciudad + ', ' + pedido.departamento}"></span></div>
                <div class="pedido-productos">
                    <strong style="color:#4CAF50;">Productos:</strong><br>
                    <span th:text="${pedido.productos}"></span>
                </div>
                <div style="grid-column:1/-1; text-align:right;">
                    <span class="label">Pago:</span> <span class="value" th:text="${pedido.metodoPago}"></span>
                    <span style="margin-left:20px;" class="pedido-total">Total: $<span th:text="${#numbers.formatDecimal(pedido.total, 0, 'COMMA', 0, 'POINT')}"></span></span>
                </div>
            </div>

            <!-- Info de envío -->
            <div class="guia-info" th:if="${pedido.transportadora != null}">
                🚚 <strong>Transportadora:</strong> <span th:text="${pedido.transportadora}"></span>
                <span th:if="${pedido.numeroGuia != null}" style="margin-left:15px;">📋 <strong>Guía:</strong> <span th:text="${pedido.numeroGuia}"></span></span>
            </div>

            <!-- Acciones según estado -->
            <div class="acciones">
                <form th:if="${pedido.estado == 'Pendiente'}" th:action="@{/admin/cambiar-estado/{id}(id=${pedido.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="key" th:value="${key}">
                    <input type="hidden" name="estado" value="Procesando">
                    <button type="submit" class="btn-accion btn-procesar">🔄 Procesar</button>
                </form>

                <div th:if="${pedido.estado == 'Procesando'}">
                    <form class="envio-form" th:action="@{/admin/cambiar-estado/{id}(id=${pedido.id})}" method="post">
                        <input type="hidden" name="key" th:value="${key}">
                        <input type="hidden" name="estado" value="Enviado">
                        <select name="transportadora" required>
                            <option value="">🚚 Transportadora...</option>
                            <option>Veloces</option>
                            <option>Envia</option>
                            <option>Interrapidísimo</option>
                            <option>Domina</option>
                            <option>Coordinadora</option>
                            <option>99minutos</option>
                            <option>TCC</option>
                            <option>Droppi</option>
                        </select>
                        <input type="text" name="numeroGuia" placeholder="Número de guía" required>
                        <button type="submit" class="btn-accion btn-enviar">📦 Enviar</button>
                    </form>
                </div>

                <form th:if="${pedido.estado == 'Enviado'}" th:action="@{/admin/cambiar-estado/{id}(id=${pedido.id})}" method="post" style="display:inline;">
                    <input type="hidden" name="key" th:value="${key}">
                    <input type="hidden" name="estado" value="Entregado">
                    <button type="submit" class="btn-accion btn-entregar">✅ Entregado</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var key = /*[[${key}]]*/ '';
</script>
</body>
</html>
