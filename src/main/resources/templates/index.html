<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalLive - Salud & Bienestar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%); color: #e0e0e0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .molecula { position: absolute; animation: flotarMolecula linear infinite; opacity: 0.08; }
        @keyframes flotarMolecula { 0% { transform: translateY(105vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.1; } 90% { opacity: 0.05; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        .navbar { position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px 20px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(76,175,80,0.15); flex-wrap: wrap; }
        .nav-link { color: #999; text-decoration: none; padding: 8px 18px; border-radius: 25px; transition: all 0.3s; font-size: 0.85rem; border: 1px solid transparent; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(76,175,80,0.1); border-color: rgba(76,175,80,0.3); }
        .cart-nav-link { border-color: rgba(76,175,80,0.4) !important; color: #fff !important; }
        #cartCount { background: #4CAF50; color: #fff; border-radius: 50%; padding: 2px 7px; font-size: 0.7rem; margin-left: 5px; }
        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 60px 20px 40px; }
        .logo-text { font-size: 3rem; font-weight: 300; letter-spacing: 8px; color: #fff; text-transform: uppercase; background: linear-gradient(180deg, #fff 30%, #4CAF50 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { font-size: 0.9rem; color: #4CAF50; letter-spacing: 10px; text-transform: uppercase; margin-top: 12px; font-weight: 400; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px 0; }
        .product-card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 30px; transition: all 0.4s ease; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-6px); background: rgba(255,255,255,0.05); border-color: rgba(76,175,80,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .product-card img { width: 100%; border-radius: 8px; margin-bottom: 20px; filter: brightness(0.95); }
        .product-icon { font-size: 3rem; text-align: center; margin-bottom: 15px; }
        .product-name { font-size: 1.1rem; font-weight: 500; color: #fff; text-align: center; margin-bottom: 8px; letter-spacing: 0.5px; }
        .product-price { font-size: 1.6rem; font-weight: 600; text-align: center; color: #4CAF50; margin: 8px 0; }
        .product-desc { color: #888; text-align: center; font-size: 0.85rem; line-height: 1.6; margin-top: 8px; flex-grow: 1; }
        .product-sku { display: block; text-align: center; color: #666; font-size: 0.7rem; margin-top: 12px; }
        .btn-add-cart { width: 100%; margin-top: 15px; padding: 12px; background: transparent; color: #4CAF50; border: 1px solid #4CAF50; border-radius: 25px; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-add-cart:hover { background: #4CAF50; color: #000; box-shadow: 0 0 20px rgba(76,175,80,0.3); }
        footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 20px; text-align: center; margin-top: 60px; position: relative; z-index: 1; }
        .footer-links { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-bottom: 15px; }
        .footer-links a { color: #666; text-decoration: none; font-size: 0.8rem; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .footer-links a:hover { color: #4CAF50; }
        .footer-copy { color: #444; font-size: 0.75rem; }
        @media (max-width: 600px) { .logo-text { font-size: 2rem; letter-spacing: 4px; } .subtitle { letter-spacing: 5px; font-size: 0.75rem; } }
    </style>
</head>
<body>
<div class="bg-animated" id="bgAnimado"></div>
<nav class="navbar">
    <a href="/" class="nav-link active">Inicio</a>
    <a href="#" class="nav-link">Salud</a>
    <a href="#" class="nav-link">Bienestar</a>
    <a href="#" class="nav-link">Cuidado</a>
    <a href="/seguimiento" class="nav-link">🔍 Seguimiento</a>
    <a href="/carrito" class="nav-link cart-nav-link">🛒 <span id="cartCount">0</span></a>
</nav>
<div class="container">
    <header class="header">
        <h1 class="logo-text">GlobalLive</h1>
        <p class="subtitle">✦ Salud & Bienestar ✦</p>
    </header>
    <div class="products-grid">
        <div th:each="producto : ${productos}" class="product-card">
            <a th:href="@{/producto/{id}(id=${producto.id})}" style="text-decoration: none; color: inherit;">
                <img th:if="${producto.imagen1 != null}" th:src="${producto.imagen1}" th:alt="${producto.nombre}">
                <div class="product-icon" th:if="${producto.imagen1 == null}">🌿</div>
                <h3 class="product-name" th:text="${producto.nombre}">Nombre</h3>
                <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">Precio</div>
                <p class="product-desc" th:text="${producto.descripcion}">Descripción</p>
                <span class="product-sku" th:text="'Ref: ' + ${producto.sku != null ? producto.sku : 'N/A'}">SKU</span>
            </a>
            <button class="btn-add-cart" th:attr="onclick='agregarAlCarrito(\'' + ${producto.nombre} + '\', ' + ${producto.precio} + ', \'' + ${producto.imagen1 != null ? producto.imagen1 : ''} + '\')'">Agregar al carrito</button>
        </div>
    </div>
</div>
<footer>
    <div class="footer-links"><a href="/">Inicio</a><a href="/carrito">Carrito</a><a href="/seguimiento">Seguimiento</a><a href="#">Contacto</a></div>
    <p class="footer-copy">GlobalLive &copy; 2026 · Salud & Bienestar</p>
</footer>

<!-- CHAT FLOTANTE -->
<div id="chatFloating" style="position:fixed; bottom:20px; right:20px; z-index:999;">
    <button onclick="toggleChat()" style="background:#4CAF50; color:#000; border:none; width:60px; height:60px; border-radius:50%; font-size:1.5rem; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.5);">💬</button>
    <div id="chatBox" style="display:none; position:absolute; bottom:70px; right:0; width:380px; background:#1a1a1a; border:1px solid #4CAF50; border-radius:16px; overflow:hidden;">
        <div style="background:#4CAF50; color:#000; padding:15px; display:flex; justify-content:space-between; align-items:center;"><h3 style="margin:0; font-size:1rem;">💬 GlobalLive</h3><button onclick="toggleChat()" style="background:none; border:none; color:#000; font-size:1.2rem; cursor:pointer;">✕</button></div>
        <div id="chatLogin" style="padding:20px;">
            <p style="color:#888; font-size:0.8rem; margin-bottom:10px;">Ingresa tu código de seguimiento o celular</p>
            <input type="text" id="chatCodigoInput" placeholder="Código o celular..." style="width:100%; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff; margin-bottom:10px;">
            <button onclick="iniciarChat()" style="width:100%; padding:10px; background:#4CAF50; color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:600;">Ver mi pedido</button>
            <div id="chatError" style="color:#ff4444; font-size:0.75rem; margin-top:8px;"></div>
        </div>
        <div id="chatContent" style="display:none; flex-direction:column; height:400px;">
            <div id="chatPedidoInfo" style="padding:12px; background:rgba(76,175,80,0.1); border-bottom:1px solid #333; font-size:0.8rem;"></div>
            <div id="chatMensajes" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:8px;"></div>
            <div style="padding:12px; border-top:1px solid #333; display:flex; gap:8px;">
                <input type="text" id="chatMensajeInput" placeholder="Escribe..." style="flex:1; padding:10px; background:#111; border:1px solid #333; border-radius:8px; color:#fff;">
                <button onclick="enviarMensajeChat()" style="background:#4CAF50; color:#000; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:600;">Enviar</button>
            </div>
        </div>
    </div>
</div>

<script>
    var chatCodigo = '';
    function toggleChat() { var box = document.getElementById('chatBox'); box.style.display = box.style.display === 'none' ? 'block' : 'none'; }
    function iniciarChat() {
        var codigo = document.getElementById('chatCodigoInput').value.trim(); if (!codigo) return; document.getElementById('chatError').textContent = '';
        fetch('/api/pedido/' + codigo).then(r => r.json()).then(data => {
            if (!data.error) { chatCodigo = data.codigo; mostrarChatInfo(data); }
            else {
                var telefono = codigo.replace(/[^0-9]/g, '');
                if (telefono.length >= 10) {
                    fetch('/api/chat/mensajes?telefono=' + telefono).then(r => r.json()).then(mensajes => {
                        if (mensajes.length > 0) { chatCodigo = mensajes[0].codigoPedido; fetch('/api/pedido/' + chatCodigo).then(r => r.json()).then(d => { if (!d.error) mostrarChatInfo(d); }); }
                        else { document.getElementById('chatError').textContent = 'No se encontró el pedido.'; }
                    });
                } else { document.getElementById('chatError').textContent = 'No se encontró el pedido.'; }
            }
        });
    }
    function mostrarChatInfo(data) { document.getElementById('chatLogin').style.display = 'none'; document.getElementById('chatContent').style.display = 'flex'; document.getElementById('chatPedidoInfo').innerHTML = '<strong style="color:#4CAF50;">📦 ' + data.codigo + '</strong> | Estado: ' + data.estado + (data.transportadora ? ' | 🚚 ' + data.transportadora + ' - ' + data.numeroGuia : ''); cargarMensajesChat(); }
    function cargarMensajesChat() {
        var chatInput = document.getElementById('chatMensajeInput'); var textoActual = chatInput ? chatInput.value : '';
        fetch('/api/chat/mensajes?codigo=' + chatCodigo).then(r => r.json()).then(mensajes => {
            var html = ''; mensajes.forEach(function(m) { if (m.esCliente) { html += '<div style="align-self:flex-end; background:#4CAF50; color:#000; padding:8px 12px; border-radius:12px; max-width:80%; font-size:0.85rem;">' + m.mensaje + '</div>'; if (m.respuesta) html += '<div style="align-self:flex-start; background:#333; color:#fff; padding:8px 12px; border-radius:12px; max-width:80%; font-size:0.85rem;">' + m.respuesta + '</div>'; } });
            document.getElementById('chatMensajes').innerHTML = html || '<p style="color:#666; text-align:center;">Envía un mensaje para recibir ayuda</p>';
            document.getElementById('chatMensajes').scrollTop = document.getElementById('chatMensajes').scrollHeight;
            if (chatInput && textoActual.length > 0) { chatInput.value = textoActual; chatInput.focus(); }
        });
        setTimeout(cargarMensajesChat, 3000);
    }
    function enviarMensajeChat() { var mensaje = document.getElementById('chatMensajeInput').value.trim(); if (!mensaje) return; fetch('/api/chat/enviar', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({codigo:chatCodigo, telefono:'', mensaje:mensaje}) }).then(function() { document.getElementById('chatMensajeInput').value = ''; cargarMensajesChat(); }); }
    const bg = document.getElementById('bgAnimado'); const iconos = ['🧬','💊','🌿','🩺','🧪','💚','🫒','🍃','✨','🧘'];
    for (let i = 0; i < 30; i++) { const el = document.createElement('div'); el.className = 'molecula'; el.textContent = iconos[Math.floor(Math.random()*iconos.length)]; el.style.cssText = 'left:'+Math.random()*95+'%;font-size:'+(Math.random()*2+1)+'rem;animation-duration:'+(Math.random()*20+15)+'s;animation-delay:'+Math.random()*10+'s;'; bg.appendChild(el); }
    function agregarAlCarrito(nombre, precio, imagen) { let carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || []; carrito.push({ nombre, precio, imagen, cantidad: 1, color: '', talla: '' }); localStorage.setItem('carritoVibeColombia', JSON.stringify(carrito)); actualizarContador(); alert('✅ ¡Agregado al carrito!'); }
    function actualizarContador() { const carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || []; const countEl = document.getElementById('cartCount'); if (countEl) countEl.textContent = carrito.length; }
    actualizarContador(); setInterval(actualizarContador, 3000);
</script>
</body>
</html>
